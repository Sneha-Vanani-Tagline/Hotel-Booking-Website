{% extends 'base.html' %}

{% block content %}
    <div class="row">
        <div class="col-5 col-sm-12 text-center">
            <div class="card" style="width: 18rem;">
                <img src="{{ url_for('static', filename='images/' + data.image) }}" class="card-img" alt="profile image">
                <div class="card-body">
                    <h5 class="card-title">{{ data.name }}</h5>
                    <p class="card-text">Email: {{ data.email }}</p>
                    <a href="{{ url_for('profile.edit', id=data.id) }}" class="btn btn-secondary">Edit</a>
                    <a href="{{ url_for('auth.reset_password') }}" class="btn btn-warning">Reset Password</a>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
